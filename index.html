      padding: 12px 20px;

      border-radius: 8px;

    }
    #ergebnis {

    }
    .tier-block {
      margin-bottom: 20px;
    }
    .tier-block strong {
      font-size: 18px;
      color: #2c3e50;
    }
    .zurueck-btn {
      background-color: #95a5a6;
      color: white;
      border: none;
      padding: 10px 16px;
      font-size: 14px;
      border-radius: 6px;

</head>

// Der restliche JavaScript-Code (Logik) wird hier gleich automatisch ergänzt.


// Logik zur Anzeige und Auswertung
const tierMapping = {
  Adler: ["S1", "R26"],
  Ameise: ["S2", "R25"],
  Yak: ["R1", "S26"],
  Katze: ["R2", "S25"],
  Hund: ["S12", "R15"],
  Gibbon: ["S11", "R16"],
  Wal: ["S23", "R4"],
  Biene: ["S3", "R24"],
  Chamäleon: ["S4", "R23"],
  Wurm: ["R3", "S24"],
  Einhorn: ["S6", "R21"],
  Schakal: ["R5", "S22"],
  Eiche: ["S7", "R20"],
  Eule: ["S8", "R19"],
  Faultier: ["S9", "R18"],
  Geier: ["S10", "R17"],
  Hyäne: ["S14", "R13"],
  Hybrid: ["S13", "R14"],
  Kind: ["R10", "S17"],
  Klapperschlange: ["R9", "S18"],
  Löwe: ["R8", "S19"],
  Maus: ["R7", "S20"],
  Dinosaurier: ["S5", "R22"]
};

const tierTexte = {
  Adler: "Fokussiert, mit Weitblick und Führungsqualitäten ausgestattet.",
  Ameise: "Fleißig, strukturiert und ein echtes Organisationstalent.",
  Yak: "Robust, ausdauernd und widerstandsfähig – ein Fels in der Brandung.",

  Gibbon: "Kommunikativ, sozial und verbindend.",
  Wal: "Ruhepol mit viel Einfühlungsvermögen und Vermittlungsgeschick.",
  Biene: "Kreativ, kooperativ und voller Ideen – bringt frischen Wind.",
  Chamäleon: "Anpassungsfähig und offen – ein flexibler Allrounder.",
  Wurm: "Findet kreative Wege – auch ungewöhnliche Lösungen schrecken nicht ab.",
  Einhorn: "Visionär, idealistisch und inspirierend.",
  Schakal: "Strategisch, clever und immer auf Chancen fokussiert.",
  Eiche: "Stabil, bodenständig und veränderungsbereit.",
  Eule: "Weise, vorausschauend und durchdacht in Entscheidungen.",
  Faultier: "Bedächtig, reflektiert und stressresistent.",
  Geier: "Vorausschauend, strategisch und ressourcenschonend.",
  Hyäne: "Durchsetzungsstark, zielorientiert und flexibel.",
  Hybrid: "Vielseitig, kreativ und innovativ.",
  Kind: "Spontan, neugierig und offen für Neues.",
  Klapperschlange: "Schnell, entschlossen und willensstark.",
  Löwe: "Mutig, führungsstark und entscheidungsfreudig.",
  Maus: "Sorgfältig, achtsam und teamorientiert.",
  Dinosaurier: "Kraftvoll, ausdauernd und bereit, Großes zu leisten."
};

const form = document.getElementById("fragebogen");

fragen.forEach((f, index) => {
  const div = document.createElement("div");
  div.classList.add("frage");
  div.innerHTML = `<h2>Frage ${index + 1}</h2><p>${f.frage}</p>`;
  for (let [buchstabe, antwort] of Object.entries(f.antworten)) {
    div.innerHTML += `<div class="antwort">
      <label><input type="radio" name="frage${index}" value="${antwort.code}" required>
      <strong>${buchstabe}:</strong> ${antwort.text}</label>
    </div>`;
  }
  form.insertBefore(div, form.lastElementChild);
});

form.addEventListener("submit", function (e) {
  e.preventDefault();
  const auswahl = new FormData(form);
  const zaehler = {};

  for (let [tier, codes] of Object.entries(tierMapping)) {
    zaehler[tier] = 0;
    for (let code of codes) {
      for (let antwort of auswahl.values()) {
        if (antwort === code) zaehler[tier]++;
      }
    }
  }

  const top3 = Object.entries(zaehler)
    .sort((a, b) => b[1] - a[1])
    .slice(0, 3)
    .filter(([_, count]) => count > 0);

  const resultDiv = document.getElementById("ergebnis");
  if (top3.length === 0) {
    resultDiv.innerHTML = "<p>Keine Tiercharaktere konnten ermittelt werden.</p>";
    return;
  }

  resultDiv.innerHTML = `<h2>Deine Tiercharaktere:</h2>` +
    top3.map(([tier]) => `
      <div class="tier-block">
        <strong>${tier}</strong><br>
        ${tierTexte[tier]}
      </div>`).join("") +
    '<button class="zurueck-btn" onclick="location.reload()">Neu starten</button>';
});
